<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pipeline CI/CD Django</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background-color: #0d6efd;
            color: #ffffff;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        main {
            width: min(680px, 100%);
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 70px rgba(0, 32, 96, 0.28);
            backdrop-filter: blur(12px);
        }
        .badge {
            display: inline-block;
            padding: .4rem .75rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.2);
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        h1 { margin: 1.25rem 0 .75rem; font-size: clamp(2rem, 7vw, 4rem); line-height: 1; }
        p { margin: 0; max-width: 54ch; font-size: 1.08rem; line-height: 1.65; }
    </style>
</head>
<body>
    <main>
        <span class="badge">Django + GitHub Actions + Vercel</span>
        <h1>Pipeline CI/CD</h1>
        <p>Cette page bleue indique que le contrôle de couleur autorise la mise en production.</p>
    </main>
</body>
</html>
